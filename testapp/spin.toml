#:schema https://schemas.spinframework.dev/spin/manifest-v2/latest.json

spin_manifest_version = 2

[application]
name = "testapp"
version = "0.1.0"
authors = ["Radu Matei <radu.matei@fermyon.com>"]
description = "A test Spin application for experimenting with components, variables, and KV stores"

# ── Application-level variables ────────────────────────────────────────────────
# required = true means spin up will error unless a value is supplied via
# SPIN_VARIABLE_<NAME>, --variable flag, or a secrets provider.
[variables]
api_base_url = { default = "http://api.example.com" }
api_token = { required = true }
app_env = { default = "development" }

# ── Triggers ───────────────────────────────────────────────────────────────────
[[trigger.http]]
route = "/..."
component = "testapp"

[[trigger.http]]
route = "/api/..."
component = "api-handler"

# ── Component: testapp ─────────────────────────────────────────────────────────
[component.testapp]
source = "target/wasm32-wasip1/release/testapp.wasm"
allowed_outbound_hosts = []
# Grant access to the default KV store
key_value_stores = ["default"]

# Expose a subset of application variables to this component.
# Static values (like app_version) can be mixed with dynamic references.
[component.testapp.variables]
app_env = "{{ app_env }}"
app_version = "v1"

[component.testapp.build]
command = "cargo build --target wasm32-wasip1 --release"
watch = ["src/**/*.rs", "Cargo.toml"]

# ── Component: api-handler ─────────────────────────────────────────────────────
[component.api-handler]
source = "api-handler/target/wasm32-wasip1/release/api_handler.wasm"
# Allow outbound calls to the API base URL — uses the variable at load time.
allowed_outbound_hosts = ["{{ api_base_url }}"]
# This component gets access to both the default store and a named "sessions" store.
key_value_stores = ["default", "sessions"]

# Only this component sees the api_token secret — least-privilege pattern.
[component.api-handler.variables]
api_base_url = "{{ api_base_url }}"
api_token = "{{ api_token }}"
app_env = "{{ app_env }}"

[component.api-handler.build]
command = "cargo build --target wasm32-wasip1 --release"
workdir = "api-handler"
watch = ["src/**/*.rs", "Cargo.toml"]
