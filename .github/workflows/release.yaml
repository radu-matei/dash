name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PROGRAM_NAME: dashboard
  SPIN_VERSION: v3.2.0

jobs:
  build:
    name: Build plugin binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        config:
          - { goArch: "amd64", goOs: "linux",   pluginifyArch: "amd64",   pluginifyOs: linux   }
          - { goArch: "arm64", goOs: "linux",   pluginifyArch: "aarch64", pluginifyOs: linux   }
          - { goArch: "amd64", goOs: "windows", pluginifyArch: "amd64",   pluginifyOs: windows }
          - { goArch: "amd64", goOs: "darwin",  pluginifyArch: "amd64",   pluginifyOs: macos   }
          - { goArch: "arm64", goOs: "darwin",  pluginifyArch: "aarch64", pluginifyOs: macos   }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build UI
        working-directory: ui
        run: npm ci && npm run build

      - name: Install Spin
        uses: rajatjindal/setup-actions/spin@main
        with:
          version: ${{ env.SPIN_VERSION }}

      - name: Install Pluginify
        run: spin plugins install --url https://github.com/itowlson/spin-pluginify/releases/download/canary/pluginify.json --yes

      - name: Build Plugin Binary
        run: |
          SHA=$(git rev-parse --short HEAD)
          GOOS=${{ matrix.config.goOs }} GOARCH=${{ matrix.config.goArch }} \
            go build -ldflags "-X github.com/spinframework/dash/cmd.CommitSHA=${SHA}" \
            -o ${{ env.PROGRAM_NAME }} main.go

      - name: Create Arch-Specific Plugin Manifest
        run: spin pluginify --arch ${{ matrix.config.pluginifyArch }} --os ${{ matrix.config.pluginifyOs }}

      - name: Archive Binary and Manifest
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROGRAM_NAME }}-${{ matrix.config.pluginifyOs }}-${{ matrix.config.pluginifyArch }}
          path: |
            *.tar.gz
            *.json

  package:
    name: Package Plugin
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    if: github.event_name == 'push'
    steps:
      - name: Install Spin
        uses: rajatjindal/setup-actions/spin@main
        with:
          version: ${{ env.SPIN_VERSION }}

      - name: Install Pluginify
        run: spin plugins install --url https://github.com/itowlson/spin-pluginify/releases/download/canary/pluginify.json --yes

      - name: Set release version (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "RELEASE_VERSION=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_ENV

      - name: Set release version (canary)
        if: github.ref == 'refs/heads/main'
        run: echo "RELEASE_VERSION=canary" >> $GITHUB_ENV

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Merge manifests
        run: |
          spin pluginify --merge --release-url-base https://github.com/radu-matei/dash/releases/download/${{ env.RELEASE_VERSION }}/ >${{ env.PROGRAM_NAME }}.json

      - name: Display merged manifest
        run: cat ${{ env.PROGRAM_NAME }}.json

      - name: Gather release assets
        run: |
          mkdir release-assets
          find . -name "*.tar.gz" -exec cp {} release-assets/ \;
          cp ${{ env.PROGRAM_NAME }}.json release-assets/
          ls release-assets/

      - name: Create versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        run: gh release create ${{ env.RELEASE_VERSION }} --title "${{ env.RELEASE_VERSION }}" --repo ${{ github.repository }} release-assets/*
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Delete existing canary release
        if: github.ref == 'refs/heads/main'
        run: gh release delete canary --repo ${{ github.repository }} --cleanup-tag || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Recreate canary release
        if: github.ref == 'refs/heads/main'
        run: gh release create canary --title "canary" --prerelease --repo ${{ github.repository }} release-assets/*
        env:
          GH_TOKEN: ${{ github.token }}
